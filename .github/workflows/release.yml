name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            zip: windows.zip
          - os: macos-latest
            zip: macos.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "requirements/*.txt"

      - name: Build release zip
        run: |
          uv venv --python 3.13
          uv pip install invoke==2.2.0
          uv run invoke release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.zip }}
          path: dist/${{ matrix.zip }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
